version: "3.9"

# Uso local: docker compose -f docker-compose.local.yml up --build
# Frontend: http://localhost:3099
# Backend:  http://localhost:8099  (docs: http://localhost:8099/docs)

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dragones
      POSTGRES_USER: dragones
      POSTGRES_PASSWORD: dragones
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dragones"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "8099:8000"
    environment:
      DATABASE_URL: postgresql://dragones:dragones@db:5432/dragones
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      LANDING_USERNAME: dragones
      LANDING_PASSWORD: dragones123
      SECRET_KEY: local-dev-secret-key
      CORS_ORIGINS: http://localhost:3099
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8099
    ports:
      - "3099:3000"
    depends_on:
      - backend

volumes:
  pgdata_local:
