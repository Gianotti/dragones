version: "3.9"
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dragones
      POSTGRES_USER: dragones
      POSTGRES_PASSWORD: dragones
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dragones"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: dragones-api
    pull_policy: build
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://dragones:dragones@db:5432/dragones
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme123}
      LANDING_USERNAME: ${LANDING_USERNAME:-dragones}
      LANDING_PASSWORD: ${LANDING_PASSWORD:-changeme123}
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://dragones.codanthic.com}
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    networks:
      - default
      - proxy-net

  frontend:
    build:
      context: ./frontend
    container_name: dragones
    pull_policy: build
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - default
      - proxy-net

volumes:
  pgdata:

networks:
  default:
  proxy-net:
    external: true
